name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same PR/branch when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bindings:
    name: Bindings (typecheck + build + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Build every package up front so each one's dist/ + .d.ts exist before
      # `pnpm -r typecheck`. Downstream packs resolve
      # `@newton-xyz/policy-pack-shared` from its dist, and the worked example
      # under examples/ resolves the per-pack packages it imports
      # (@newton-xyz/policy-pack-vaultsfyi, -chainalysis) the same way. pnpm
      # builds in topological order, so shared lands before its dependents.
      - name: Build
        run: pnpm -r build

      # Fail the PR if generated bindings drifted from the upstream pack
      # JSON schemas, OR if any tracked file is unformatted. Codegen emits
      # unformatted output by design (biome owns the canonical format), so
      # we regen + lint:fix in the runner and `git diff --exit-code` over
      # the whole tree. Scoping to `packages/` would mask `lint:fix`
      # rewrites under `scripts/` — drift is drift, anywhere.
      - name: Verify generated bindings + format are up to date
        run: |
          set -euo pipefail
          pnpm gen:bindings
          pnpm lint:fix
          if ! git diff --exit-code; then
            echo "::error::Working tree is not clean after \`gen:bindings\` + \`lint:fix\`. Run both locally and commit the diff."
            exit 1
          fi

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm lint

      # Phase 0 § Stream C — fail any PR that introduces a raw
      # `return JSON.stringify(...)` callsite in <pack>/policy.js NOT routed
      # through `wrapOutput` from @newton-xyz/policy-pack-shared. Composite
      # gating depends on every pack wrapping its WASM output under its own
      # PACK_ID key so the AVS-side merge_jsons composes cleanly.
      #
      # Run the fixture test BEFORE the production lint — if the guard logic
      # itself is broken, the fixture test produces a clearer diagnostic
      # (good/bad fixtures with known expected violations) than the production
      # lint failing on real-pack allowlist drift.
      - name: Test the AST guard itself (good + bad fixtures)
        run: pnpm lint:policy-js:test

      - name: Lint policy.js (AST guard)
        run: pnpm lint:policy-js

      # Guard the codegen itself: the `_manifest` reservation walker, the
      # composite params-schema generator, and the stagef-never-published
      # filter (`filterPublishedEnvs`). These protect invariants that the
      # `git diff --exit-code` drift check can't express on its own.
      - name: Test generate-bindings guards
        run: pnpm gen:bindings:test

      # Run the per-package unit suites (composite-manifest schema generator,
      # regorus-keyword guard, the composite example's anti-drift check). CI
      # previously skipped these; they're cheap and catch schema/interface
      # regressions before publish.
      - name: Unit tests
        run: pnpm -r test
